# Required project metadata
sonar.projectKey=FaceLog
sonar.projectName=FaceLog Webapp
sonar.projectVersion=1.0
# Source and language info
sonar.language=py
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Optional but recommended
# Exclude virtualenv, migrations, etc.
sonar.exclusions=**/migrations/**, **/__pycache__/**, **/venv/**

# Code coverage report path (after generating with coverage.py)
sonar.python.coverage.reportPaths=coverage.xml

# Optional: test and logging directories to ignore
sonar.test.exclusions=**/tests/**, **/test_*.py
