<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Capture</title>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: black;
            overflow: hidden;
        }

        .camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .counter {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 20px;
            color: rgb(248, 6, 6);
            font-weight: bold;
        }

        .capture-btn,
        .close-btn {
            position: absolute;
            bottom: 15%;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid gray;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .capture-btn {
            left: 45%;
            transform: translateX(-50%);
            background: white;
        }

        .capture-btn::after {
            content: '';
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: red;
        }

        .close-btn {
            left: 65%;
            transform: translateX(-50%);
            background: rgb(255, 195, 32);
        }
    </style>
</head>

<body>
    <div class="camera-container">
        <video id="camera" autoplay playsinline></video>
        <div class="counter">0</div>
        <div class="capture-btn" id="captureBtn" title="Capture Photo"></div>
        <div class="close-btn" id="closeBtn" title="Close Camera">Close</div>
        <div class="notification" id="notification">Image saved successfully!</div>
    </div>

    <script>
        // Select DOM elements
        const video = document.getElementById('camera');
        const counterDisplay = document.querySelector('.counter');
        const captureBtn = document.getElementById('captureBtn');
        const closeBtn = document.getElementById('closeBtn');
        const notification = document.getElementById('notification');

        let photoCount = 0;
        let stream = null;
        const MAX_PHOTOS = 10;

        // Initialize camera stream using async/await
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch (error) {
                console.error('Error accessing camera:', error);
                alert('Unable to access camera. Please check permissions and try again.');
            }
        }
        // Function to show auto-dismissing notification
        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 1000); // Hide after 1 second
        }
        // Capture the current video frame, send it to the server, and update the UI
        async function capturePhoto() {
            try {
                // Ensure the video has loaded its metadata so that dimensions are available
                if (video.videoWidth === 0 || video.videoHeight === 0) {
                    alert('Video not ready. Please try again.');
                    return;
                }

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const context = canvas.getContext('2d');

                // Draw the current video frame onto the canvas
                context.drawImage(video, 0, 0, canvas.width, canvas.height);

                // Convert canvas to Base64 JPEG image data
                const imageData = canvas.toDataURL('image/jpeg');

                // Send the captured image to the server
                const response = await fetch('/save-image/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                if (response.ok) {
                    // alert('Image saved successfully!');
                    showNotification('Image saved successfully!')
                } else {
                    alert('Failed to save the image.');
                }

                // Increment photo count and update UI counter
                photoCount++;
                counterDisplay.innerText = photoCount;

                // Stop camera if maximum photo count is reached
                if (photoCount >= MAX_PHOTOS) {
                    stopCameraAndReturn();
                }
            } catch (error) {
                console.error('Error capturing photo:', error);
                alert('An error occurred while capturing the photo.');
            }
        }

        // Stop all tracks of the camera stream
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        // Stop the camera and navigate back
        function stopCameraAndReturn() {
            stopCamera();
            window.onbeforeunload = null;
            window.location.href = '/student_profile';
        }

        // Cleanup camera when the user leaves the page
        window.addEventListener('beforeunload', stopCamera);

        // Attach event listeners after DOM content is loaded
        document.addEventListener('DOMContentLoaded', () => {
            initCamera();
            captureBtn.addEventListener('click', capturePhoto);
            closeBtn.addEventListener('click', stopCameraAndReturn);
        });
    </script>
</body>

</html>
